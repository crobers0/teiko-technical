{% extends 'base.html' %}
{% block content %}
<h2>Visualizations</h2>
{% if visuals %}
  {% for v in visuals %}
    <section>
      <h3>{{ v.name }}</h3>
      <iframe src="{{ v.url }}" width="100%" height="600" frameborder="0"></iframe>
    </section>
  {% endfor %}
{% else %}
  <p>No visualizations found. Run the pipeline to generate HTML outputs.</p>
{% endif %}
{% endblock %}
