<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Pipeline Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  </head>
  <body>
    <div class="container">
      <header class="site-header">
        <div class="title-area">
          <h1>Pipeline Dashboard</h1>
          <p class="subtitle">Browse data, visualizations and analytics</p>
        </div>

        <nav class="main-nav">
          <a class="nav-link" href="{{ url_for('index') }}">Home</a>
          <a class="nav-link" href="{{ url_for('data_table') }}">Data</a>
          <a class="nav-link" href="{{ url_for('visuals') }}">Visuals</a>
          <a class="nav-link" href="{{ url_for('analytics') }}">Analytics</a>
        </nav>
      </header>

      <main class="content">
        {% block content %}{% endblock %}
      </main>

      <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
    </div>
  </body>
</html>
